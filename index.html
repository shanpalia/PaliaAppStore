<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PaliaAPK HUB</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
<div class="brand" id="logoTrigger"><img src="assets/images/logo.png" alt="Logo"><h1>PaliaAPK HUB</h1></div>
<form id="searchForm"><input id="searchInput" type="search" placeholder="Search apps"><div id="searchSuggestions" hidden></div></form>
<button id="notificationBtn">🔔</button><button id="profileBtn">👤</button>
</header>
<main id="mainContent">
<section id="heroSlider"><div id="sliderTrack"></div><button id="sliderPrev">‹</button><button id="sliderNext">›</button><div id="sliderDots"></div></section>
<section><h2>Categories</h2><div id="categoriesList"></div></section>
<section><h2>Featured Apps</h2><button class="view-all-btn" data-target="featuredApps">View All</button><div id="featuredApps"></div></section>
<section><h2>Trending</h2><button class="view-all-btn" data-target="trendingApps">View All</button><div id="trendingApps"></div></section>
<section><h2>New Apps</h2><button class="view-all-btn" data-target="newApps">View All</button><div id="newApps"></div></section>
<section><h2>Top Charts</h2><button class="view-all-btn" data-target="topCharts">View All</button><div id="topCharts"></div></section>
<section><h2>Recommended</h2><div id="recommendedApps"></div></section>
</main>
<nav id="bottomNav">
<a class="bottom-nav-link active" href="#mainContent">Home</a>
<a class="bottom-nav-link" href="#featuredApps">Apps</a>
<a class="bottom-nav-link" id="bottomSearchLink" href="#">Search</a>
<a class="bottom-nav-link" href="app.html">Updates</a>
<a class="bottom-nav-link" id="bottomProfileLink" href="#">Profile</a>
</nav>
<div id="loadingOverlay" hidden>Loading...</div>
<div id="toast"></div>
<footer>© <span id="currentYear"></span> PaliaAPK HUB</footer>
<script src="script.js"></script>
</body>
</html>
